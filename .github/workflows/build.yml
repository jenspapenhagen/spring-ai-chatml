name: Build

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6.0.3

      - name: Set up JDK 25
        uses: actions/setup-java@v5.3.0
        with:
          java-version: '25'
          distribution: 'temurin'

      - name: Build with Maven
        run: ./mvnw compile -q
